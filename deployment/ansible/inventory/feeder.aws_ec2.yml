plugin: amazon.aws.aws_ec2
regions:
  - eu-west-2     # feeder region (London)    — MockExchange + Feeder
  - eu-central-1  # subscriber region (Frankfurt) — Subscribers

include_filters:
  - tag:Role:
      - exchange
      - feeder
      - subscriber

hostnames:
  - ip-address

compose:
  ansible_host: public_ip_address
  ansible_user: "'ec2-user'"
  # SSH key selected by region: feeder region uses london.pem, subscriber region uses frankfurt.pem
  ansible_ssh_private_key_file: >-
    '~/.ssh/london.pem' if placement.region == 'eu-west-2' else '~/.ssh/frankfurt.pem'

groups:
  exchange:     "tags.Role == 'exchange'"
  feeder:       "tags.Role == 'feeder'"
  subscribers:  "tags.Role == 'subscriber'"
  feeder_nodes: "tags.Role in ['feeder', 'subscriber']"
