plugin: amazon.aws.aws_ec2
# Targets the region of the McastCpgStack deployment.
# Set AWS_DEFAULT_REGION or pass --aws-region to ansible-inventory / ansible-playbook.

include_filters:
  - tag:Role:
      - exchange
      - feeder
      - subscriber

hostnames:
  - ip-address

compose:
  ansible_host: public_ip_address
  ansible_user: "'ec2-user'"
  # Key file path — set SSH_KEY_FILE env var before running ansible-playbook.
  ansible_ssh_private_key_file: "lookup('env', 'SSH_KEY_FILE')"

groups:
  exchange:     "tags.Role == 'exchange'"
  feeder:       "tags.Role == 'feeder'"
  subscribers:  "tags.Role == 'subscriber'"
  all: "tags.Role in ['feeder', 'subscriber', 'exchange']"
